<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PodJobs.ai // Terminal CLI Skill Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050608;
      --terminal-bg: #0c0d12;
      --border: #1e293b;
      --text: #a7f3d0;
      --white: #ffffff;
      --grey: #64748b;
      --cyan: #22d3ee;
      --yellow: #fbbf24;
      --green: #34d399;
      --red: #f87171;
      --magenta: #f472b6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Courier Prime', monospace;
      padding: 30px;
      overflow-x: hidden;
      line-height: 1.5;
    }

    .terminal-window {
      max-width: 1000px;
      margin: 0 auto;
      background-color: var(--terminal-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    .terminal-header {
      background-color: #12151f;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .window-controls {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }

    .dot-red { background-color: #ef4444; }
    .dot-yellow { background-color: #eab308; }
    .dot-green { background-color: #22c55e; }

    .window-title {
      font-size: 11px;
      color: var(--grey);
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .terminal-body {
      padding: 25px;
      min-height: 560px;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .prompt {
      color: var(--cyan);
    }

    .command-text {
      color: var(--white);
      font-weight: bold;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 15px;
      background-color: var(--text);
      margin-left: 2px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* ANSI Colors Simulation */
    .c-green { color: var(--green); }
    .c-yellow { color: var(--yellow); }
    .c-blue { color: #60a5fa; }
    .c-magenta { color: var(--magenta); }
    .c-cyan { color: var(--cyan); }
    .c-red { color: var(--red); }
    .c-dim { color: var(--grey); }
    .c-bright { color: var(--white); font-weight: bold; }
    
    /* Scroll indicator */
    .scroll-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(18, 21, 31, 0.9);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      color: var(--yellow);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 100;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--yellow);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <div class="scroll-indicator">

  Log output: <span class="c-dim">Executed agent task. Specialty: Material comparison. Hash reference: a8d5e9f2b1c4</span> (<span class="c-yellow">Task Completed</span>)` },
      { action: 'print', delay: 700, text: `[+1.8s] <span class="c-bright">Brief Drafter</span> -> <span class="c-green">Processing task: "Draft contract review"</span>
  Log output: <span class="c-dim">Executed agent task. Specialty: Formative writing. Hash reference: 5f1c9d8a3b2e</span> (<span class="c-yellow">Task Completed</span>)` },

      { action: 'print', delay: 400, text: `

    let currentStep = 0;

    function renderPrompt() {
      const promptSpan = document.createElement('span');
      promptSpan.className = 'prompt';
      promptSpan.innerText = 'PS K:\\Cpastone-Project-kaggle5day> ';
      
      const cmdTextSpan = document.createElement('span');
      cmdTextSpan.className = 'command-text';
      
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'cursor';
      
      consoleEl.appendChild(promptSpan);
      consoleEl.appendChild(cmdTextSpan);
      consoleEl.appendChild(cursorSpan);
      
      return { cmdTextSpan, cursorSpan };
    }

    function executeNextStep() {
      if (currentStep >= script.length) {
        document.querySelector('.scroll-indicator').innerHTML = "<span>SESSION COMPLETED</span>";
        return;
      }

      const step = script[currentStep];
      currentStep++;

      if (step.action === 'type') {
        const { cmdTextSpan, cursorSpan } = renderPrompt();
        let charIndex = 0;
        
        function typeChar() {
          if (charIndex < step.text.length) {
            cmdTextSpan.innerText += step.text[charIndex];
            charIndex++;
            setTimeout(typeChar, 60);
          } else {
            cursorSpan.remove();
            consoleEl.innerHTML += '\n';
            executeNextStep();
          }
        }
        setTimeout(typeChar, 500);
      } else if (step.action === 'print') {
        setTimeout(() => {
          consoleEl.innerHTML += step.text;
          window.scrollTo(0, document.body.scrollHeight);
          executeNextStep();
        }, step.delay || 100);
      }
    }

    // Start simulation after 2.5 seconds
    setTimeout(executeNextStep, 2500);
  </script>
</body>
</html>
